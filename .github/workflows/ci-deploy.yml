name: CI & Deploy to HF Spaces

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        if: always()
        continue-on-error: true
        run: uv run ruff check .

      - name: Ruff format check
        if: always()
        continue-on-error: true
        run: uv run ruff format --check .

      - name: Vulture (dead code)
        if: always()
        continue-on-error: true
        run: uv run vulture src/ --min-confidence 80

      - name: Bandit (security)
        if: always()
        continue-on-error: true
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Run tests
        if: always()
        continue-on-error: true
        run: uv run pytest --tb=short -q

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Hugging Face Spaces
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://amankrs21:${HF_TOKEN}@huggingface.co/spaces/amankrs21/amantra || true
          git push space main:main --force

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: Amantra API v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            🚀 **Amantra FastAPI** deployed to Hugging Face Spaces.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
