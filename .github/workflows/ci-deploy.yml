name: CI & Deploy to HF Spaces

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        if: always()
        continue-on-error: true
        run: uv run ruff check .

      - name: Ruff format check
        if: always()
        continue-on-error: true
        run: uv run ruff format --check .

      - name: Vulture (dead code)
        if: always()
        continue-on-error: true
        run: uv run vulture src/ --min-confidence 80

      - name: Bandit (security)
        if: always()
        continue-on-error: true
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Run tests
        if: always()
        continue-on-error: true
        run: uv run pytest --tb=short -q

  deploy:
    name: Deploy to Hugging Face Spaces
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://amankrs21:${HF_TOKEN}@huggingface.co/spaces/amankrs21/amantra || true
          git push space main:main --force
